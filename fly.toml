app = "emm-dawn-glade-5884"
primary_region = "sin"

[build]
dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"

[processes]
  app = "bin/server"
  cron = "supercronic /app/crontab"
  fly scale count app=2 cron=1
