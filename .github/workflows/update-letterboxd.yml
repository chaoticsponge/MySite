name: Update Letterboxd

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: letterboxd/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node packages
        working-directory: letterboxd
        run: npm ci

      - name: Install Python packages
        run: pip install pyyaml

      - name: Make script executable
        run: chmod +x scripts/update_letterboxd_github.sh

      - name: Create .env
        working-directory: letterboxd
        run: |
          cat > .env <<EOF
          OUTPUT_DIR=movies
          IMAGE_PATH_DIR=letterboxd/movies
          EOF

      - name: Run updater
        run: ./scripts/update_letterboxd_github.sh

      - name: Verify output
        working-directory: letterboxd
        run: |
          echo "Movies:"
          find movies -name "*.md" | tail -10

          echo ""
          echo "Index:"
          ls -l index.json

          echo ""
          echo "Newest entries:"
          python3 -c "
          import json
          with open('index.json') as f: data=json.load(f)
          print(len(data))
          print(data[:5])
          "
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add letterboxd/

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update Letterboxd"
      - name: Push changes
        run: git push
