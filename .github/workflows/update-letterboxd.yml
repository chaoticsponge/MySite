name: Update Letterboxd

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: letterboxd/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node packages
        working-directory: letterboxd
        run: npm ci

      - name: Install Python packages
        run: pip install pyyaml

      - name: Make script executable
        run: chmod +x scripts/update_letterboxd_github.sh

      - name: Run updater
        run: ./scripts/update_letterboxd_github.sh
