# Force lowercase URLs globally

RewriteEngine On
RewriteMap tolower int:tolower

# Keep the retired mixed-case article URL working before the global lowercase rule runs.
RewriteRule ^travel/Singapore_DJ-POV(?:\.html)?$ /travel/singapore-dj-pov [R=301,L]

RewriteCond %{REQUEST_URI} [A-Z]
RewriteRule ^(.*)$ ${tolower:$1} [R=301,L]
