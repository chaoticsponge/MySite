<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 - Forbidden</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #ffffff; /* --color-bg */
      color: #1a1a1a; /* --color-text */
      font-family: Georgia, "Times New Roman", serif; /* matches your main body font */
      line-height: 1.7;
    }

    h1 {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; /* matches header font */
      font-size: 7rem;
      font-weight: 600;
      margin: 0;
      line-height: 1;
    }

    p {
      font-size: 1.2rem;
      color: #666666; /* --color-meta */
      margin-top: 1rem;
      font-family: Georgia, "Times New Roman", serif;
    }

    a {
      margin-top: 2rem;
      color: #1a1a1a; /* --color-link (black in your theme) */
      text-decoration: none;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-size: 1rem;
      transition: color 0.2s ease;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>403</h1>
  <p>Access to this page is forbidden.</p>
  <a href="/index.html">Return to Home</a>
</body>
</html>
