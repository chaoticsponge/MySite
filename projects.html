    (function () {
      var key = "theme";
      var stored = "";
      try {
        stored = localStorage.getItem(key);
      } catch (e) { }
      var prefersDark =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;
      var theme = stored || (prefersDark ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>

      <script data-analytics-src="/scripts/analytics.js">

        var analyticsSrc = document.currentScript && document.currentScript.dataset.analyticsSrc;

        window.addEventListener("load", function () {

          script.async = true;
          script.defer = true;
